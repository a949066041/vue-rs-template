name: Release @yy-web/vue-template

on:
  push:
    branches:
      - main

concurrency:
  group: release-vue-template-cli
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Ensure npm supports OIDC (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release:cli
          title: 'chore: release @yy-web/vue-template'
          commit: 'chore: release @yy-web/vue-template'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
